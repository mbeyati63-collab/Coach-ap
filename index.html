<!DOCTYPE html>

<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachPro</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CoachPro">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2438;--accent:#f97316;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#a855f7;--text:#f1f5f9;--muted:#64748b;--border:#1e2d45}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text);direction:rtl}
*::-webkit-scrollbar{width:4px}*::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(–surface);border:1px solid var(–border);border-radius:20px;padding:34px 26px;width:100%;max-width:370px;text-align:center}
.l-logo{font-size:46px;margin-bottom:10px}
.l-title{font-size:22px;font-weight:800;margin-bottom:3px}
.l-sub{font-size:13px;color:var(–muted);margin-bottom:22px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.role-card{padding:14px;border-radius:12px;border:2px solid var(–border);background:var(–surface2);cursor:pointer;transition:.2s;font-family:‘Vazirmatn’,sans-serif}
.role-card.on{border-color:var(–accent);background:rgba(249,115,22,.1)}
.role-icon{font-size:26px;margin-bottom:6px}
.role-name{font-size:13px;font-weight:700}
.role-desc{font-size:10px;color:var(–muted);margin-top:2px}
.lbl{font-size:12px;color:var(–muted);font-weight:600;margin-bottom:6px;display:block;text-align:right}
.inp{width:100%;padding:10px 12px;background:var(–surface2);border:1px solid var(–border);border-radius:9px;color:var(–text);font-family:‘Vazirmatn’,sans-serif;font-size:13px;outline:none;transition:.2s}
.inp:focus{border-color:var(–accent)}
.pin-inp{font-size:18px;text-align:center;letter-spacing:8px}
.err{color:var(–red);font-size:12px;margin-top:5px;min-height:16px}
.login-btn{width:100%;padding:13px;background:var(–accent);color:#fff;border:none;border-radius:12px;font-family:‘Vazirmatn’,sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;transition:.2s}
.login-btn:hover{background:#fb923c}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(–surface);border-left:1px solid var(–border);display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;z-index:10;transition:.3s}
.sb-logo{padding:18px 20px;border-bottom:1px solid var(–border);display:flex;align-items:center;gap:10px}
.sb-icon{width:36px;height:36px;background:var(–accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-title{font-size:15px;font-weight:800}
.sb-sub{font-size:10px;color:var(–muted)}
.nav{flex:1;padding:10px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:13px;color:var(–muted);border-right:3px solid transparent;font-weight:500;transition:.2s;user-select:none}
.ni:hover{color:var(–text);background:var(–surface2)}
.ni.on{color:var(–accent);background:rgba(249,115,22,.08);border-right-color:var(–accent)}
.sb-foot{padding:14px 20px;border-top:1px solid var(–border)}
.sb-user{display:flex;align-items:center;gap:10px}
.sb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(–accent),var(–blue));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.sb-name{font-size:12px;font-weight:600}
.sb-role{font-size:10px;color:var(–muted)}
.logout{margin-top:10px;width:100%;padding:8px;background:var(–surface2);border:1px solid var(–border);border-radius:8px;color:var(–muted);font-family:‘Vazirmatn’,sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:.2s}
.logout:hover{color:var(–red);border-color:var(–red)}
.main{flex:1;margin-right:220px;padding:22px 24px;min-height:100vh}
.page{display:none}.page.on{display:block}
.ph{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px}
.pt{font-size:20px;font-weight:800}
.ps{font-size:12px;color:var(–muted);margin-top:3px}

/* CARDS & STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(–surface);border:1px solid var(–border);border-radius:14px;padding:16px;position:relative;overflow:hidden}
.sc::before{content:’’;position:absolute;top:0;right:0;width:3px;height:100%}
.sc.o::before{background:var(–accent)}.sc.b::before{background:var(–blue)}.sc.g::before{background:var(–green)}.sc.y::before{background:var(–yellow)}
.si{font-size:20px;margin-bottom:8px}
.sn{font-size:22px;font-weight:800}
.sl{font-size:11px;color:var(–muted);margin-top:3px}
.cg{display:grid;grid-template-columns:1fr 300px;gap:16px}
.card{background:var(–surface);border:1px solid var(–border);border-radius:14px;overflow:hidden;margin-bottom:16px}
.ch{padding:14px 18px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ct{font-size:14px;font-weight:700}
.cb{padding:16px}

/* BUTTONS */
.btn{padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-family:‘Vazirmatn’,sans-serif;font-size:12px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(–accent);color:#fff}.bp:hover{background:#fb923c}
.bg{background:var(–surface2);color:var(–muted)}.bg:hover{color:var(–text)}
.bd{background:rgba(239,68,68,.15);color:var(–red);border:1px solid rgba(239,68,68,.3)}
.be{background:rgba(59,130,246,.15);color:var(–blue);border:1px solid rgba(59,130,246,.3)}
.bsm{padding:5px 9px;font-size:11px}

/* LIST ITEMS */
.ai{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(–border)}
.ai:last-child{border-bottom:none}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.an{font-size:13px;font-weight:600}
.am{font-size:11px;color:var(–muted);margin-top:2px}

/* BADGES */
.badge{padding:3px 9px;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap}
.bg-gr{background:rgba(34,197,94,.15);color:var(–green)}
.bg-rd{background:rgba(239,68,68,.15);color:var(–red)}
.bg-yl{background:rgba(234,179,8,.15);color:var(–yellow)}
.bg-bl{background:rgba(59,130,246,.15);color:var(–blue)}
.bg-or{background:rgba(249,115,22,.15);color:var(–accent)}
.bg-pu{background:rgba(168,85,247,.15);color:var(–purple)}

/* PROGRESS */
.pb{height:6px;background:var(–border);border-radius:3px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:3px;transition:width .5s}

/* ATTENDANCE */
.att-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(–surface2);border-radius:12px;border:1px solid var(–border);margin-bottom:8px}
.att-btns{display:flex;gap:4px;margin-right:auto;flex-wrap:wrap}
.sb2{padding:5px 8px;border-radius:7px;border:1px solid var(–border);font-size:10px;font-weight:700;cursor:pointer;font-family:‘Vazirmatn’,sans-serif;background:var(–surface);color:var(–muted);transition:.2s}
.sb2.pr{background:rgba(34,197,94,.2);color:var(–green);border-color:var(–green)}
.sb2.ab{background:rgba(239,68,68,.2);color:var(–red);border-color:var(–red)}
.sb2.la{background:rgba(234,179,8,.2);color:var(–yellow);border-color:var(–yellow)}
.sb2.rs{background:rgba(168,85,247,.2);color:var(–purple);border-color:var(–purple)}
.save-att{padding:6px 14px;background:var(–accent);color:#fff;border:none;border-radius:8px;font-family:‘Vazirmatn’,sans-serif;font-size:11px;font-weight:700;cursor:pointer}

/* FINANCE */
.tx{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(–border)}
.tx:last-child{border-bottom:none}
.tx-in{font-size:14px;font-weight:800;color:var(–green)}
.tx-out{font-size:14px;font-weight:800;color:var(–red)}

/* SESSION LOG */
.slog{padding:11px 0;border-bottom:1px solid var(–border)}
.slog:last-child{border-bottom:none}
.slog-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.slog-note{font-size:12px;background:var(–surface2);border-radius:8px;padding:8px 10px;margin-top:6px;line-height:1.7}

/* NUTRITION */
.nut-box{background:var(–surface2);border-radius:10px;padding:13px;margin-top:8px;font-size:12px;line-height:2;white-space:pre-wrap}

/* ALERT */
.al{padding:10px 13px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:9px}
.al-w{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);color:var(–yellow)}
.al-i{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(–blue)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mbox{background:var(–surface);border:1px solid var(–border);border-radius:16px;padding:22px;width:100%;max-width:430px;max-height:92vh;overflow-y:auto}
.mt{font-size:15px;font-weight:800;margin-bottom:16px}
.fg{margin-bottom:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* MY STATS */
.ms{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.msb{background:var(–surface2);border-radius:12px;padding:16px;text-align:center}
.msv{font-size:26px;font-weight:800}
.msl{font-size:11px;color:var(–muted);margin-top:4px}

/* HAMBURGER */
.hb{display:none;position:fixed;top:14px;left:14px;z-index:20;background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:18px}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9}

@media(max-width:768px){
.sidebar{right:-220px}.sidebar.on{right:0}
.ovl.on{display:block}
.main{margin-right:0;padding:14px}
.hb{display:flex}
.sg{grid-template-columns:repeat(2,1fr)}
.cg{grid-template-columns:1fr}
.fr{grid-template-columns:1fr}
.att-btns{gap:3px}
.sb2{padding:4px 7px;font-size:9px}
}
</style>

</head>
<body>

<!-- LOGIN -->

<div id="LS" class="login-wrap">
  <div class="login-box">
    <div class="l-logo">💪</div>
    <div class="l-title">CoachPro</div>
    <div class="l-sub">پنل مدیریت مربی ورزشی</div>
    <div class="role-grid">
      <div class="role-card on" id="rc" onclick="selRole('coach')">
        <div class="role-icon">🏋️</div><div class="role-name">مربی</div><div class="role-desc">دسترسی کامل</div>
      </div>
      <div class="role-card" id="ra" onclick="selRole('athlete')">
        <div class="role-icon">👤</div><div class="role-name">ورزشکار</div><div class="role-desc">اطلاعات شخصی</div>
      </div>
    </div>
    <div id="pinSec">
      <label class="lbl">رمز مربی</label>
      <input class="inp pin-inp" type="password" id="pin" maxlength="4" placeholder="••••" oninput="document.getElementById('perr').textContent=''">
      <div class="err" id="perr"></div>
    </div>
    <div id="athSec" style="display:none">
      <label class="lbl">نام خود را انتخاب کنید</label>
      <select class="inp" id="athSel" style="margin-top:4px"></select>
    </div>
    <button class="login-btn" onclick="doLogin()">ورود به پنل</button>
  </div>
</div>

<!-- APP -->

<div id="AS" style="display:none">
  <button class="hb" onclick="togSB()">☰</button>
  <div class="ovl" id="ovl" onclick="togSB()"></div>
  <div class="app">
    <div class="sidebar" id="sb">
      <div class="sb-logo">
        <div class="sb-icon">💪</div>
        <div><div class="sb-title">CoachPro</div><div class="sb-sub" id="sbRole">پنل مربی</div></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sb-foot">
        <div class="sb-user">
          <div class="sb-av" id="sbAv">م</div>
          <div><div class="sb-name" id="sbName">مربی</div><div class="sb-role" id="sbRole2">مربی ارشد</div></div>
        </div>
        <button class="logout" onclick="logout()">🚪 خروج</button>
      </div>
    </div>
    <div class="main" id="main"></div>
  </div>
</div>

<!-- MODALS -->

<!-- Athlete Modal -->

<div class="mo" id="mAth">
  <div class="mbox">
    <div class="mt" id="mAthT">➕ افزودن ورزشکار</div>
    <div class="fr">
      <div class="fg"><label class="lbl">نام</label><input class="inp" id="fN" placeholder="علی"></div>
      <div class="fg"><label class="lbl">نام خانوادگی</label><input class="inp" id="fF" placeholder="رضایی"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="lbl">وزن (kg)</label><input class="inp" type="number" id="fW" placeholder="75"></div>
      <div class="fg"><label class="lbl">کل جلسات</label><input class="inp" type="number" id="fSe" placeholder="12"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="lbl">جلسات استفاده شده</label><input class="inp" type="number" id="fU" placeholder="0"></div>
      <div class="fg"><label class="lbl">درصد حضور</label><input class="inp" type="number" id="fAt" placeholder="100"></div>
    </div>
    <div class="fg"><label class="lbl">هدف</label>
      <select class="inp" id="fG"><option>کاهش وزن</option><option>افزایش حجم</option><option>آمادگی عمومی</option><option>افزایش قدرت</option></select>
    </div>
    <div class="fg"><label class="lbl">برنامه تمرینی</label><input class="inp" id="fP" placeholder="قدرتی + کاردیو"></div>
    <div class="fg"><label class="lbl">وضعیت اشتراک</label>
      <select class="inp" id="fSb"><option>فعال</option><option>منقضی</option></select>
    </div>
    <div class="ma">
      <button class="btn bg" onclick="cm('mAth')">انصراف</button>
      <button class="btn bp" onclick="saveAth()">✓ ذخیره</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->

<div class="mo" id="mDel">
  <div class="mbox" style="max-width:300px;text-align:center">
    <div style="font-size:36px;margin-bottom:10px">🗑️</div>
    <div class="mt">حذف ورزشکار</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px" id="delMsg"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn bg" onclick="cm('mDel')">انصراف</button>
      <button class="btn bd" onclick="confDel()">حذف</button>
    </div>
  </div>
</div>

<!-- Transaction Modal -->

<div class="mo" id="mTx">
  <div class="mbox">
    <div class="mt">➕ ثبت تراکنش مالی</div>
    <div class="fg"><label class="lbl">ورزشکار</label><select class="inp" id="txAth"></select></div>
    <div class="fr">
      <div class="fg"><label class="lbl">مبلغ (تومان)</label><input class="inp" type="number" id="txAmt" placeholder="1000000"></div>
      <div class="fg"><label class="lbl">تاریخ</label><input class="inp" type="date" id="txDt"></div>
    </div>
    <div class="fg"><label class="lbl">نوع تراکنش</label>
      <select class="inp" id="txTp"><option value="in">💚 دریافتی (واریز شهریه)</option><option value="out">🔴 پرداختی (هزینه)</option></select>
    </div>
    <div class="fg"><label class="lbl">توضیحات</label><input class="inp" id="txDs" placeholder="شهریه اردیبهشت"></div>
    <div class="ma">
      <button class="btn bg" onclick="cm('mTx')">انصراف</button>
      <button class="btn bp" onclick="saveTx()">✓ ثبت</button>
    </div>
  </div>
</div>

<!-- Session Modal -->

<div class="mo" id="mSes">
  <div class="mbox">
    <div class="mt">📝 ثبت جلسه تمرینی</div>
    <div class="fg"><label class="lbl">ورزشکار</label><select class="inp" id="sesAth"></select></div>
    <div class="fr">
      <div class="fg"><label class="lbl">تاریخ</label><input class="inp" type="date" id="sesDt"></div>
      <div class="fg"><label class="lbl">مدت (دقیقه)</label><input class="inp" type="number" id="sesDur" placeholder="60"></div>
    </div>
    <div class="fg"><label class="lbl">ساعت شروع</label><input class="inp" type="time" id="sesTm"></div>
    <div class="fg"><label class="lbl">نوع تمرین</label><input class="inp" id="sesTp" placeholder="قدرتی + کاردیو"></div>
    <div class="fg"><label class="lbl">توضیحات جلسه (تمرینات انجام شده)</label>
      <textarea class="inp" id="sesNt" placeholder="اسکوات 4×10&#10;بنچ پرس 4×8&#10;تردمیل 20 دقیقه" style="resize:vertical;min-height:90px"></textarea>
    </div>
    <div class="ma">
      <button class="btn bg" onclick="cm('mSes')">انصراف</button>
      <button class="btn bp" onclick="saveSes()">✓ ثبت جلسه</button>
    </div>
  </div>
</div>

<!-- Nutrition Modal -->

<div class="mo" id="mNut">
  <div class="mbox">
    <div class="mt">🥗 برنامه تغذیه</div>
    <div class="fg"><label class="lbl">ورزشکار</label><select class="inp" id="nutAth" onchange="loadNut()"></select></div>
    <div class="fg"><label class="lbl">کالری روزانه</label><input class="inp" type="number" id="nutCal" placeholder="2000"></div>
    <div class="fg"><label class="lbl">برنامه وعده‌ها (هر وعده یک خط)</label>
      <textarea class="inp" id="nutPl" placeholder="صبحانه: تخم مرغ + نان سبوس&#10;ناهار: مرغ + برنج + سبزی&#10;شام: ماهی + سالاد&#10;میان‌وعده: میوه + مغز" style="resize:vertical;min-height:110px"></textarea>
    </div>
    <div class="ma">
      <button class="btn bg" onclick="cm('mNut')">انصراف</button>
      <button class="btn bp" onclick="saveNut()">✓ ذخیره برنامه</button>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
const PIN='0000';
const COLS=['#f97316','#3b82f6','#22c55e','#a855f7','#ec4899','#06b6d4','#84cc16','#f59e0b'];
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

let aths=ld('cp_a',[
  {id:1,name:'علی رضایی',goal:'کاهش وزن',sessions:8,used:5,color:'#f97316',att:88,sub:'فعال',weight:85,plan:'قدرتی + کاردیو'},
  {id:2,name:'سارا محمدی',goal:'افزایش حجم',sessions:12,used:9,color:'#3b82f6',att:75,sub:'فعال',weight:62,plan:'هایپرتروفی'},
  {id:3,name:'کمال نوری',goal:'آمادگی عمومی',sessions:8,used:2,color:'#22c55e',att:95,sub:'فعال',weight:78,plan:'فانکشنال'},
  {id:4,name:'مریم احمدی',goal:'کاهش وزن',sessions:10,used:10,color:'#a855f7',att:60,sub:'منقضی',weight:70,plan:'کاردیو'},
  {id:5,name:'رضا کریمی',goal:'افزایش قدرت',sessions:16,used:6,color:'#ec4899',att:82,sub:'فعال',weight:90,plan:'پاورلیفتینگ'},
]);
let txs=ld('cp_tx',[]);
let nuts=ld('cp_nut',{});
let sess=ld('cp_ses',[]);
let attLogs=ld('cp_att',{});
let nxId=Math.max(0,...aths.map(a=>a.id))+1;
let nxTx=Math.max(0,...txs.map(t=>t.id))+1;
let nxSes=Math.max(0,...sess.map(s=>s.id))+1;
let curRole='coach';
let curAthId=null;
let edAthId=null;
let delAthId=null;
let tmpAtt={};
let curAttDate=td();

// ===== HELPERS =====
function td(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`}
function f(n){return String(n).replace(/\d/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d])}
function ini(name){const p=name.trim().split(' ');return p.length>=2?p[0][0]+'‌'+p[1][0]:p[0].substring(0,2)}
function ac(v){return v>80?'var(--green)':v>60?'var(--yellow)':'var(--red)'}
function fd(d){if(!d)return'';try{const[gy,gm,gd]=d.split('-').map(Number);const[jy,jm,jdd]=toShamsi(gy,gm,gd);return`${f(jy)}/${f(String(jm).padStart(2,'0'))}/${f(String(jdd).padStart(2,'0'))}`}catch{return d}}
function fm(n){return Number(n).toLocaleString('fa')+' ت'}
function cm(id){document.getElementById(id).classList.remove('on')}

// ===== SHAMSI CALENDAR =====
function toShamsi(gy,gm,gd){
  const leap=y=>(y%4===0&&y%100!==0)||y%400===0;
  const gDays=[0,31,leap(gy)?29:28,31,30,31,30,31,31,30,31,30,31];
  let jy=gy<=1600?0:979;gy-=gy<=1600?621:1600;
  const gy2=gy+(gm>2?1:0);
  let gdn=365*gy+Math.floor((gy2+3)/4)-Math.floor((gy2+99)/100)+Math.floor((gy2+399)/400);
  for(let i=0;i<gm-1;i++)gdn+=gDays[i+1];gdn+=gd-1;
  let jdn=gdn-79;const jnp=Math.floor(jdn/12053);jdn%=12053;
  jy+=33*jnp+4*Math.floor(jdn/1461);jdn%=1461;
  if(jdn>=366){jy+=Math.floor((jdn-1)/365);jdn=(jdn-1)%365}
  const jml=[0,31,31,31,31,31,31,30,30,30,30,30,29];
  let jm=0;for(let i=1;i<=11;i++){if(jdn>=jml[i]){jdn-=jml[i];jm++}else break}
  return[jy,jm+1,jdn+1];
}
function fromShamsi(jy,jm,jd){
  jy=+jy;jm=+jm;jd=+jd;
  const jy2=jy<=979?0:979,jy3=jy-(jy<=979?561:1600);
  const jml=[0,31,31,31,31,31,31,30,30,30,30,30,29];
  let jdn=365*jy3+Math.floor(jy3/4)-Math.floor(jy3/100)+Math.floor(jy3/400);
  for(let i=0;i<jm-1;i++)jdn+=jml[i+1];jdn+=jd-1;
  let gdn=jdn+79,gy=1600+400*Math.floor(gdn/146097);let gdn2=gdn%146097;
  let leap=true;
  if(gdn2>=36525){gdn2--;gy+=100*Math.floor(gdn2/36524);gdn2%=36524;gdn2>=365?gdn2++:(leap=false)}
  gy+=4*Math.floor(gdn2/1461);gdn2%=1461;
  if(gdn2>=366){leap=false;gdn2--;gy+=Math.floor(gdn2/365);gdn2%=365}
  const gdm=[0,31,leap?29:28,31,30,31,30,31,31,30,31,30,31];
  let gm=0;for(let i=1;i<=11;i++){if(gdn2>=gdm[i]){gdn2-=gdm[i];gm++}else break}
  return`${gy+jy2}-${String(gm+1).padStart(2,'0')}-${String(gdn2+1).padStart(2,'0')}`;
}
function todayShamsi(){const n=new Date();return toShamsi(n.getFullYear(),n.getMonth()+1,n.getDate())}
const JMNS=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
const JDYS=['ش','ی','د','س','چ','پ','ج'];
let calY=0,calM=0;
function initCal(){const[y,m]=todayShamsi();calY=y;calM=m;}
function jDim(y,m){return[0,31,31,31,31,31,31,30,30,30,30,30,m===12&&(y-474)%2820%20===0?30:29][m]}

function renderCal(){
  const[ty,tm,tday]=todayShamsi();
  const selJ=curAttDate?toShamsi(...curAttDate.split('-').map(Number)):null;
  const dim=jDim(calY,calM);
  const firstGreg=fromShamsi(calY,calM,1);
  const dow=(new Date(firstGreg).getDay()+1)%7;
  const el=document.getElementById('calWrap');
  if(!el)return;
  el.innerHTML=`
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)">

      <span style="font-size:15px;font-weight:800">${JMNS[calM-1]} ${f(calY)}</span>
      <button onclick="calNav(-1)" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 14px;color:var(--text);cursor:pointer;font-size:16px;font-family:Vazirmatn,sans-serif">‹</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);padding:10px 8px;gap:2px">
      ${JDYS.map(d=>`<div style="text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding:5px 2px">${d}</div>`).join('')}
      ${Array(dow).fill('<div></div>').join('')}
      ${Array.from({length:dim},(_,i)=>{
        const day=i+1;
        const greg=fromShamsi(calY,calM,day);
        const isToday=ty===calY&&tm===calM&&tday===day;
        const isSel=selJ&&selJ[0]===calY&&selJ[1]===calM&&selJ[2]===day;
        const hasLog=attLogs[greg]&&Object.keys(attLogs[greg]).length>0;
        return`<div onclick="selDay('${greg}')" style="text-align:center;padding:8px 2px;border-radius:9px;cursor:pointer;font-size:13px;

          color:${isSel?'#fff':isToday?'var(--accent)':'var(--text)'}">${f(day)}${hasLog?`<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:${isSel?'#fff':'var(--green)'};display:block"></span>`:''}</div>`;
      }).join('')}
    </div>
  </div>`;
  rAttList();
}

function calNav(d){
  calM+=d;if(calM>12){calM=1;calY++}if(calM<1){calM=12;calY--}

  </div>
  <div class="card"><div class="cb">
    ${sess.length===0?'<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px">هنوز جلسه‌ای ثبت نشده<br><br>بعد از هر جلسه اطلاعات آن را اینجا وارد کنید</div>':
    sess.slice().reverse().map(s=>`
    <div class="slog">
      <div class="slog-h">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;font-weight:700">${s.ath}</span>
          <span class="badge bg-bl">${s.tp||'عمومی'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:var(--muted)">${fd(s.dt)} ${s.tm||''}</span>
          <button class="btn bd bsm" onclick="delSes(${s.id})">🗑️</button>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted)">${f(s.dur)} دقیقه</div>
      ${s.nt?`<div class="slog-note">${s.nt}</div>`:''}
    </div>`).join('')}
  </div></div>`;
}

function omSes(){
  document.getElementById('sesAth').innerHTML=aths.map(a=>`<option value="${a.name}">${a.name}</option>`).join('');
  document.getElementById('sesDt').value=td();
  document.getElementById('sesDur').value='60';
  document.getElementById('sesTm').value='';
  document.getElementById('sesTp').value='';
  document.getElementById('sesNt').value='';
  document.getElementById('mSes').classList.add('on');
}
function saveSes(){
  const ath=document.getElementById('sesAth').value;
  const dt=document.getElementById('sesDt').value;
  if(!ath||!dt){alert('لطفاً ورزشکار و تاریخ را وارد کنید');return}
  sess.push({id:nxSes++,ath,dt,dur:document.getElementById('sesDur').value||60,
    tm:document.getElementById('sesTm').value,tp:document.getElementById('sesTp').value,
    nt:document.getElementById('sesNt').value});
  sv('cp_ses',sess);cm('mSes');rp('ses');
}
function delSes(id){sess=sess.filter(s=>s.id!==id);sv('cp_ses',sess);rp('ses')}

// ===== NUTRITION =====
function bNut(){
  return `
  <div class="ph">
    <div><div class="pt">برنامه تغذیه 🥗</div></div>
    <button class="btn bp" onclick="omNut()">+ ویرایش برنامه</button>
  </div>
  <div class="card"><div class="cb">
    ${aths.map(a=>{
      const pl=nuts[a.id];
      return `
      <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="av" style="width:36px;height:36px;font-size:12px;background:${a.color}33;color:${a.color}">${ini(a.name)}</div>
            <div>
              <div style="font-size:13px;font-weight:600">${a.name}</div>
              <div style="font-size:11px;color:var(--muted)">${pl?f(pl.cal)+' کالری روزانه':'برنامه ثبت نشده'}</div>
            </div>
          </div>
          <button class="btn be bsm" onclick="omNut(${a.id})">✏️ ویرایش</button>
        </div>
        ${pl&&pl.pl?`<div class="nut-box">${pl.pl}</div>`:`<div style="font-size:12px;color:var(--muted);padding:10px;background:var(--surface2);border-radius:8px">برنامه غذایی هنوز تنظیم نشده — روی ویرایش کلیک کنید</div>`}
      </div>`;
    }).join('')}
  </div></div>`;
}

function omNut(id=null){
  const sel=document.getElementById('nutAth');
  sel.innerHTML=aths.map(a=>`<option value="${a.id}" ${a.id===id?'selected':''}>${a.name}</option>`).join('');
  loadNut();
  document.getElementById('mNut').classList.add('on');
}
function loadNut(){
  const id=parseInt(document.getElementById('nutAth').value);
  const pl=nuts[id];
  document.getElementById('nutCal').value=pl?.cal||'';
  document.getElementById('nutPl').value=pl?.pl||'';
}
function saveNut(){
  const id=parseInt(document.getElementById('nutAth').value);
  nuts[id]={cal:document.getElementById('nutCal').value,pl:document.getElementById('nutPl').value};
  sv('cp_nut',nuts);cm('mNut');rp('nut');
}

// ===== FINANCE =====
function bFin(){
  const inc=txs.filter(t=>t.tp==='in').reduce((s,t)=>s+Number(t.amt),0);
  const exp=txs.filter(t=>t.tp==='out').reduce((s,t)=>s+Number(t.amt),0);
  return `
  <div class="ph">
    <div><div class="pt">مدیریت مالی 💰</div></div>
    <button class="btn bp" onclick="omTx()">+ ثبت تراکنش</button>
  </div>
  <div class="sg">
    <div class="sc g"><div class="si">💚</div><div class="sn" style="font-size:15px">${fm(inc)}</div><div class="sl">کل دریافتی</div></div>
    <div class="sc o"><div class="si">💸</div><div class="sn" style="font-size:15px">${fm(exp)}</div><div class="sl">کل پرداختی</div></div>
    <div class="sc b"><div class="si">📊</div><div class="sn" style="font-size:15px">${fm(inc-exp)}</div><div class="sl">خالص</div></div>
    <div class="sc y"><div class="si">📋</div><div class="sn">${f(txs.length)}</div><div class="sl">تعداد تراکنش</div></div>
  </div>
  <div class="card">
    <div class="ch"><span class="ct">📋 تراکنش‌ها</span></div>
    <div class="cb">
      ${txs.length===0?'<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px">هنوز تراکنشی ثبت نشده<br><br>هر بار که شاگردی پرداخت کرد اینجا ثبت کنید</div>':
      txs.slice().reverse().map(t=>`
      <div class="tx">
        <div>
          <div style="font-size:13px;font-weight:600">${t.ds||'—'}</div>
          <div style="font-size:11px;color:var(--muted)">${t.ath} · ${fd(t.dt)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="${t.tp==='in'?'tx-in':'tx-out'}">${t.tp==='in'?'+':'−'}${fm(t.amt)}</div>
          <button class="btn bd bsm" onclick="delTx(${t.id})">🗑️</button>
        </div>
      </div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="ch"><span class="ct">وضعیت اشتراک</span></div>
    <div class="cb">
      ${aths.map(a=>`
      <div class="tx">
        <div><div style="font-size:13px;font-weight:600">${a.name}</div><div style="font-size:11px;color:var(--muted)">${f(a.sessions-a.used)} جلسه مانده از ${f(a.sessions)}</div></div>
        <span class="badge ${a.sub==='فعال'?'bg-gr':'bg-rd'}">${a.sub}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function omTx(){
  document.getElementById('txAth').innerHTML=aths.map(a=>`<option value="${a.name}">${a.name}</option>`).join('');
  document.getElementById('txDt').value=td();
  document.getElementById('txAmt').value='';
  document.getElementById('txDs').value='';
  document.getElementById('txTp').value='in';
  document.getElementById('mTx').classList.add('on');
}
function saveTx(){
  const amt=document.getElementById('txAmt').value;
  const dt=document.getElementById('txDt').value;
  if(!amt||!dt){alert('لطفاً مبلغ و تاریخ را وارد کنید');return}
  txs.push({id:nxTx++,amt,dt,ath:document.getElementById('txAth').value,
    tp:document.getElementById('txTp').value,ds:document.getElementById('txDs').value});
  sv('cp_tx',txs);cm('mTx');rp('fin');
}
function delTx(id){txs=txs.filter(t=>t.id!==id);sv('cp_tx',txs);rp('fin')}

// ===== ATHLETE PANEL =====
function buildAthlete(){
  const a=aths.find(x=>x.id===curAthId);
  if(!a){logout();return}
  document.getElementById('sbRole').textContent='پنل ورزشکار';
  document.getElementById('sbAv').textContent=ini(a.name);
  document.getElementById('sbName').textContent=a.name;
  document.getElementById('sbRole2').textContent=a.goal;
  document.getElementById('nav').innerHTML=`
    <div class="ni on" id="ni-mi" onclick="sap('mi')">👤 اطلاعات من</div>
    <div class="ni" id="ni-mp" onclick="sap('mp')">📈 پیشرفت من</div>
    <div class="ni" id="ni-mpl" onclick="sap('mpl')">🏋️ برنامه تمرینی</div>
    <div class="ni" id="ni-mn" onclick="sap('mn')">🥗 تغذیه</div>
    <div class="ni" id="ni-ma" onclick="sap('ma')">✓ حضور من</div>
  `;
  document.getElementById('main').innerHTML=`
    <div class="page on" id="pg-mi"></div>
    <div class="page" id="pg-mp"></div>
    <div class="page" id="pg-mpl"></div>
    <div class="page" id="pg-mn"></div>
    <div class="page" id="pg-ma"></div>
  `;
  rap('mi');
}

function sap(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  document.getElementById('ni-'+id).classList.add('on');
  rap(id);cSB();
}

function rap(id){
  const a=aths.find(x=>x.id===curAthId);
  const el=document.getElementById('pg-'+id);
  if(!a||!el)return;
  if(id==='mi')el.innerHTML=bMI(a);
  else if(id==='mp')el.innerHTML=bMP(a);
  else if(id==='mpl')el.innerHTML=bMPl(a);
  else if(id==='mn')el.innerHTML=bMN(a);
  else if(id==='ma')el.innerHTML=bMA(a);
}

function bMI(a){
  return `
  <div class="ph"><div><div class="pt">اطلاعات من 👤</div></div></div>
  <div class="card"><div class="cb">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div class="av" style="width:64px;height:64px;font-size:22px;background:${a.color}33;color:${a.color}">${ini(a.name)}</div>
      <div>
        <div style="font-size:20px;font-weight:800">${a.name}</div>
        <div style="color:var(--muted);font-size:13px;margin-top:4px">${a.goal}</div>
        <span class="badge ${a.sub==='فعال'?'bg-gr':'bg-rd'}" style="margin-top:6px;display:inline-block">${a.sub}</span>
      </div>
    </div>
    <div class="ms">
      <div class="msb"><div class="msv" style="color:var(--accent)">${a.weight} kg</div><div class="msl">وزن</div></div>
      <div class="msb"><div class="msv" style="color:var(--blue)">${f(a.sessions)}</div><div class="msl">کل جلسات</div></div>
      <div class="msb"><div class="msv" style="color:var(--green)">${f(a.sessions-a.used)}</div><div class="msl">جلسات مانده</div></div>
      <div class="msb"><div class="msv" style="color:${ac(a.att)}">${f(a.att)}٪</div><div class="msl">درصد حضور</div></div>
    </div>
    <div style="font-size:12px;color:var(--muted);padding:12px;background:var(--surface2);border-radius:10px">
      📋 برنامه: <strong style="color:var(--text)">${a.plan}</strong>
    </div>
  </div></div>`;
}

function bMP(a){
  const myS=sess.filter(s=>s.ath===a.name).slice().reverse().slice(0,5);
  const pct=Math.round(a.used/a.sessions*100);
  return `
  <div class="ph"><div><div class="pt">پیشرفت من 📈</div></div></div>
  <div class="card"><div class="ch"><span class="ct">پیشرفت جلسات</span></div><div class="cb">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px">
      <span>${f(a.used)} جلسه گذشته</span><span style="color:var(--muted)">${f(a.sessions)} جلسه کل</span>
    </div>
    <div class="pb" style="height:12px"><div class="pf" style="width:${pct}%;background:var(--accent)"></div></div>
    <div style="font-size:11px;color:var(--muted);margin-top:5px">${f(pct)}٪ از برنامه طی شده</div>
  </div></div>
  <div class="card"><div class="ch"><span class="ct">آخرین جلسات تمرینی</span></div><div class="cb">
    ${myS.length===0?'<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px">هنوز جلسه‌ای ثبت نشده</div>':
    myS.map(s=>`
    <div class="slog">
      <div class="slog-h">
        <span class="badge bg-bl">${s.tp||'عمومی'}</span>
        <span style="font-size:11px;color:var(--muted)">${fd(s.dt)} · ${f(s.dur)} دقیقه</span>
      </div>
      ${s.nt?`<div class="slog-note">${s.nt}</div>`:''}
    </div>`).join('')}
  </div></div>`;
}

function bMPl(a){
  const myS=sess.filter(s=>s.ath===a.name).slice().reverse().slice(0,5);
  return `
  <div class="ph"><div><div class="pt">برنامه تمرینی 🏋️</div></div></div>
  <div class="card"><div class="ch"><span class="ct">${a.plan}</span><span class="badge bg-or">${a.goal}</span></div><div class="cb">
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">جلسات ثبت شده توسط مربی:</div>
    ${myS.length===0?'<div style="color:var(--muted);font-size:12px">هنوز جلسه‌ای ثبت نشده</div>':
    myS.map(s=>`
    <div class="slog">
      <div class="slog-h">
        <span style="font-size:13px;font-weight:600">${fd(s.dt)}</span>
        <span class="badge bg-bl">${f(s.dur)} دقیقه</span>
      </div>
      ${s.nt?`<div class="slog-note">${s.nt}</div>`:''}
    </div>`).join('')}
  </div></div>`;
}

function bMN(a){
  const pl=nuts[a.id];
  return `
  <div class="ph"><div><div class="pt">تغذیه 🥗</div></div></div>
  <div class="card"><div class="cb">
    ${pl?`
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:40px;font-weight:800;color:var(--accent)">${f(pl.cal)}</div>
      <div style="font-size:12px;color:var(--muted)">کالری روزانه</div>
    </div>
    <div class="nut-box">${pl.pl}</div>`
    :`<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px">برنامه غذایی هنوز توسط مربی تنظیم نشده</div>`}
  </div></div>`;
}

function bMA(a){
  const dates=Object.keys(attLogs).sort().reverse().slice(0,30);
  const lbl={present:'✅ حاضر',late:'⏱ تاخیر',absent:'❌ غایب',rest:'😴 استراحت'};
  const bdg={present:'bg-gr',late:'bg-yl',absent:'bg-rd',rest:'bg-pu'};
  return `
  <div class="ph"><div><div class="pt">حضور من ✓</div></div></div>
  <div class="card"><div class="cb">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:40px;font-weight:800;color:${ac(a.att)}">${f(a.att)}٪</div>
      <div style="font-size:12px;color:var(--muted)">میانگین حضور</div>
    </div>
    <div class="pb" style="height:10px;margin-bottom:16px"><div class="pf" style="width:${a.att}%;background:${ac(a.att)}"></div></div>
    ${dates.length===0?'<div style="color:var(--muted);font-size:12px;text-align:center">هنوز حضور و غیابی ثبت نشده</div>':
    dates.map(d=>{
      const st=attLogs[d]?.[a.id];
      if(!st)return '';
      return `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;font-weight:600">${fd(d)}</span>
        <span class="badge ${bdg[st]||'bg-bl'}">${lbl[st]||st}</span>
      </div>`;
    }).join('')}
  </div></div>`;
}

// ===== UTILS =====
function updSels(){
  const s=document.getElementById('athSel');
  if(s)s.innerHTML=aths.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
}

// Init
updSels();
</script>

</body>
</html>
